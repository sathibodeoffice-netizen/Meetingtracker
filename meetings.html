<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>মিটিং ট্র্যাকার — সব মিটিং</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
      </div>
      <span class="sidebar-brand-name">মিটিং ট্র্যাকার</span>
    </div>
    <nav class="nav">
      <a class="nav-link" href="dashboard.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        ড্যাশবোর্ড
      </a>
      <a class="nav-link active" href="meetings.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        সব মিটিং
      </a>
    </nav>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <span class="sidebar-footer-text">© ২০২৬ মিটিং ট্র্যাকার</span>
      <button class="btn-theme" id="btn-theme" title="থিম পরিবর্তন">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">সব মিটিং</div>
        <div class="topbar-sub">মিটিং তৈরি করুন, ক্লিক করে টাস্ক দেখুন ও পরিচালনা করুন</div>
      </div>
      <div class="topbar-right">
        <div class="year-nav">
          <button class="year-nav-btn" id="btn-prev-year">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="year-display" id="year-display">2026</span>
          <button class="year-nav-btn" id="btn-next-year">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <button class="btn btn-primary" id="btn-new-meeting">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          নতুন মিটিং
        </button>
      </div>
    </header>

    <div class="page-content">
      <!-- Month Filter -->
      <div class="filter-bar" style="margin-bottom:20px;">
        <div class="month-pills" id="month-pills">
          <button class="month-pill active" data-month="all">সব মাস</button>
        </div>
      </div>

      <!-- Meeting List -->
      <div id="meeting-list-wrap">
        <div class="empty">
          <div class="empty-icon">📅</div>
          <h3>লোড হচ্ছে...</h3>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Meeting Modal -->
<div class="modal-backdrop" id="meeting-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-heading">নতুন মিটিং</span>
      <button class="btn-icon" id="m-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="meeting-form" class="form-grid">
        <input type="hidden" id="m-id">
        <div class="form-group">
          <label class="form-label" for="m-title">মিটিংয়ের শিরোনাম *</label>
          <input class="form-input" id="m-title" type="text" placeholder="যেমন: জুন মাসের পরিকল্পনা সভা" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="m-date">তারিখ *</label>
            <input class="form-input" id="m-date" type="date" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="m-time">সময় *</label>
            <input class="form-input" id="m-time" type="time" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="m-desc">এজেন্ডা / নোট</label>
          <textarea class="form-textarea" id="m-desc" rows="4" placeholder="মিটিংয়ে আলোচিত বিষয়, সিদ্ধান্ত বা লক্ষ্যের বিবরণ লিখুন..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="m-delete" style="margin-right:auto;display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        মুছে ফেলুন
      </button>
      <button class="btn btn-secondary" id="m-cancel">বাতিল</button>
      <button class="btn btn-primary" type="submit" form="meeting-form">সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<div id="app-toast" class="toast"></div>

<script>
let openMeetingModal;

document.addEventListener('DOMContentLoaded', async () => {
  // Month pills
  const pillsEl = document.getElementById('month-pills');
  MONTH_NAMES.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-pill';
    btn.dataset.month = i;
    btn.textContent = MONTH_SHORT[i];
    pillsEl.appendChild(btn);
  });
  pillsEl.addEventListener('click', e => {
    const btn = e.target.closest('.month-pill');
    if (!btn) return;
    pillsEl.querySelectorAll('.month-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    APP.activeMonth = btn.dataset.month === 'all' ? 'all' : Number(btn.dataset.month);
    renderList();
  });

  // Wire year nav + theme
  wireGlobal(renderList);

  // Meeting modal
  openMeetingModal = createMeetingModal(
    (meeting) => renderList(),
    (id) => {
      APP.meetings = APP.meetings.filter(m => m.id !== id);
      APP.save();
      renderList();
    }
  );

  document.getElementById('btn-new-meeting').addEventListener('click', () => openMeetingModal(null));

  await APP.load();
  renderList();
});

function renderList() {
  const wrap = document.getElementById('meeting-list-wrap');
  const meetings = APP.filteredMeetings.sort((a, b) => new Date(b.date) - new Date(a.date));

  if (meetings.length === 0) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📅</div>
        <h3>কোনো মিটিং নেই</h3>
        <p>উপরে "নতুন মিটিং" বাটনে ক্লিক করে প্রথম মিটিং তৈরি করুন।</p>
      </div>`;
    return;
  }

  wrap.innerHTML = `<div class="meeting-list">${meetings.map(m => buildMeetingCard(m)).join('')}</div>`;

  // Wire edit buttons
  wrap.querySelectorAll('.meeting-edit-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const m = APP.meetings.find(x => x.id === btn.dataset.id);
      if (m) openMeetingModal(m);
    });
  });
}

function buildMeetingCard(m) {
  const tasks = m.tasks || [];
  const done = tasks.filter(t => t.completed).length;
  const total = tasks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const dateObj = new Date(m.date);
  const day = dateObj.getDate();
  const mon = MONTH_SHORT[dateObj.getMonth()];
  const weekday = dateObj.toLocaleDateString('bn-BD', { weekday: 'long' });
  const fullDate = dateObj.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });

  const allDone = total > 0 && done === total;
  const statusBadge = total === 0
    ? `<span class="badge" style="background:rgba(100,116,139,0.1);color:var(--text-3);border:1px solid var(--border);">টাস্ক নেই</span>`
    : allDone
    ? `<span class="badge badge-done">✓ সম্পন্ন</span>`
    : `<span class="badge badge-open">⏳ চলমান</span>`;

  return `
    <a class="meeting-card" href="meeting-detail.html?id=${m.id}" style="text-decoration:none;">
      <div class="meeting-date-block">
        <div class="meeting-date-day">${day}</div>
        <div class="meeting-date-mon">${mon}</div>
      </div>
      <div class="meeting-info">
        <div class="meeting-title">${escapeHTML(m.title)}</div>
        <div class="meeting-meta">
          <span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${m.time}
          </span>
          <span>${weekday}, ${fullDate}</span>
          ${statusBadge}
        </div>
        <div class="meeting-progress-row">
          <div class="meeting-progress-bar progress-bg">
            <div class="progress-fill progress-emerald" style="width:${pct}%"></div>
          </div>
          <span class="meeting-progress-text">${done}/${total} সম্পন্ন · ${pct}%</span>
        </div>
      </div>
      <div class="meeting-actions">
        <button class="btn-icon meeting-edit-btn" data-id="${m.id}" title="মিটিং সম্পাদনা">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-3)"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>
  `;
}
</script>
</body>
</html>
