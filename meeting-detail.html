<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>মিটিং বিস্তারিত — মিটিং ট্র্যাকার</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%238b5cf6'/%3E%3Crect x='6' y='8' width='20' height='18' rx='3' fill='none' stroke='white' stroke-width='2'/%3E%3Cline x1='11' y1='6' x2='11' y2='11' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='21' y1='6' x2='21' y2='11' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='6' y1='15' x2='26' y2='15' stroke='white' stroke-width='2'/%3E%3Cpolyline points='11,19 14,22 21,17' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <style>
    /* ── Remarks auto-save indicator ── */
    .remarks-saved {
      font-size: 10px;
      color: var(--emerald);
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 6px;
    }
    .remarks-saved.visible { opacity: 1; }

    /* ── Task filter pills ── */
    .task-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .task-filter-pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-2);
      background: var(--bg-elevated);
      cursor: pointer;
      transition: var(--transition);
    }
    .task-filter-pill:hover { border-color: rgba(139,92,246,0.3); }
    .task-filter-pill.active {
      background: rgba(139,92,246,0.14);
      border-color: rgba(139,92,246,0.3);
      color: var(--violet-2);
    }
    .task-filter-pill.pill-done.active { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: var(--emerald); }
    .task-filter-pill.pill-open.active { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: var(--amber); }
    .task-filter-pill.pill-incomplete.active { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #ef4444; }

    /* ── Empty dept state ── */
    .dept-empty {
      font-size: 12px;
      color: var(--text-3);
      font-style: italic;
      padding: 12px 0 4px;
    }

    /* ── Remarks block subtle bg when incomplete ── */
    .task-item.is-open .task-remarks-block {
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: var(--r-sm);
      padding: 8px;
      margin-top: 8px;
    }
    .task-item.is-open .task-remarks-label {
      color: var(--amber);
      opacity: 0.8;
    }

    /* Completion ring on done / incomplete task */
    .task-complete-ring {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 1px;
      position: relative;
    }
    body.light .task-complete-ring { border-color: rgba(0,0,0,0.15); }
    .task-complete-ring:hover { border-color: var(--emerald); }
    /* Done state – green ring with checkmark */
    .task-complete-ring.done { background: var(--emerald); border-color: var(--emerald); }
    .task-complete-ring.done .ring-check { display: block; }
    /* Incomplete state – red ring with ✕ */
    .task-complete-ring.incomplete { background: #ef4444; border-color: #ef4444; }
    .task-complete-ring.incomplete .ring-x { display: block; }
    /* Icon visibility defaults */
    .task-complete-ring .ring-check,
    .task-complete-ring .ring-x { display: none; }
    /* Incomplete remarks block */
    .task-item.is-incomplete .task-remarks-block {
      background: rgba(239,68,68,0.04);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: var(--r-sm);
      padding: 8px;
      margin-top: 8px;
    }
    .task-item.is-incomplete .task-remarks-label { color: #ef4444; opacity: 0.85; }

    /* ── Print Styles ── */
    @media print {
      .shell, body { display: block !important; background: #fff !important; }
      .sidebar, .topbar, .task-filter-row, #btn-add-task, #btn-edit-meeting,
      #btn-print, .btn-icon, .task-remarks-block, .app-toast, #app-toast { display: none !important; }
      .main { margin: 0 !important; padding: 0 !important; }
      .page-content { padding: 0 !important; }
      #meeting-banner { background: #fff !important; border: 1px solid #ddd !important; }
      #dept-sections .dept-section { break-inside: avoid; }
      #dept-sections .dept-task-list { display: block !important; }
      .dept-section.collapsed .dept-task-list { display: block !important; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
      </div>
      <span class="sidebar-brand-name">মিটিং ট্র্যাকার</span>
    </div>
    <nav class="nav">
      <a class="nav-link" href="dashboard.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        ড্যাশবোর্ড
      </a>
      <a class="nav-link active" href="meetings.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        সব মিটিং
      </a>
    </nav>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <span class="sidebar-footer-text">© ২০২৬ মিটিং ট্র্যাকার</span>
      <button class="btn-theme" id="btn-theme" title="থিম পরিবর্তন">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="detail-breadcrumb" style="font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <a href="meetings.html" style="color:var(--text-3);transition:color 0.2s;" onmouseover="this.style.color='var(--violet-2)'" onmouseout="this.style.color='var(--text-3)'">সব মিটিং</a>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          <span id="breadcrumb-title">মিটিং বিস্তারিত</span>
        </div>
        <div class="topbar-title" id="page-title">লোড হচ্ছে...</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="btn-print" onclick="printMeeting()" title="প্রিন্ট রিপোর্ট">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          প্রিন্ট করুন
        </button>
        <button class="btn btn-ghost" id="btn-edit-meeting">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          মিটিং সম্পাদনা
        </button>
        <button class="btn btn-primary" id="btn-add-task">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          টাস্ক যোগ করুন
        </button>
      </div>
    </header>

    <div class="page-content">
      <!-- Meeting Info Banner -->
      <div id="meeting-banner" style="display:none;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:24px;">
        <div style="display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div style="font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">তারিখ ও সময়</div>
            <div style="font-size:14px;font-weight:600;" id="banner-datetime">—</div>
          </div>
          <div style="flex:2;min-width:200px;">
            <div style="font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">এজেন্ডা / নোট</div>
            <div style="font-size:13px;color:var(--text-2);line-height:1.6;" id="banner-desc">—</div>
          </div>
          <div style="min-width:160px;">
            <div style="font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">অগ্রগতি</div>
            <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;" id="banner-pct">0%</div>
            <div class="progress-bg" style="margin-top:8px;">
              <div class="progress-fill progress-emerald" id="banner-bar" style="width:0%"></div>
            </div>
            <div style="font-size:11px;color:var(--text-3);margin-top:6px;" id="banner-counts">0/0 টাস্ক সম্পন্ন</div>
          </div>
        </div>
      </div>

      <!-- Task Filters -->
      <div class="task-filter-row">
        <button class="task-filter-pill active" data-filter="all">সব টাস্ক</button>
        <button class="task-filter-pill pill-open" data-filter="open">⏳ চলমান</button>
        <button class="task-filter-pill pill-done" data-filter="done">✓ সম্পন্ন</button>
        <button class="task-filter-pill pill-incomplete" data-filter="incomplete">✗ অসম্পন্ন</button>
      </div>

      <!-- Department Task Sections -->
      <div id="dept-sections"></div>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="task-modal-heading">নতুন টাস্ক যোগ করুন</span>
      <button class="btn-icon" id="t-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="task-form" class="form-grid">
        <input type="hidden" id="t-id">
        <input type="hidden" id="t-meeting-id">
        <div class="form-group">
          <label class="form-label" for="t-title">টাস্কের শিরোনাম *</label>
          <input class="form-input" id="t-title" type="text" placeholder="যেমন: মাসিক রিপোর্ট তৈরি করা" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="t-desc">বিবরণ (ঐচ্ছিক)</label>
          <textarea class="form-textarea" id="t-desc" rows="2" placeholder="টাস্কের বিস্তারিত বিবরণ লিখুন..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="t-dept">বিভাগ *</label>
            <select class="form-select" id="t-dept"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="t-priority">গুরুত্ব</label>
            <select class="form-select" id="t-priority">
              <option value="high">অধিক জরুরি 🔴</option>
              <option value="medium" selected>মাঝারি 🟡</option>
              <option value="low">কম জরুরি 🟢</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="t-assignee">দায়িত্বপ্রাপ্ত কর্মী</label>
          <input class="form-input" id="t-assignee" type="text" placeholder="শাহ মোঃ আনিসুর রহমান">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="t-cancel">বাতিল</button>
      <button class="btn btn-primary" type="submit" form="task-form">সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<!-- Meeting Edit Modal -->
<div class="modal-backdrop" id="meeting-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-heading">মিটিং সম্পাদনা</span>
      <button class="btn-icon" id="m-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="meeting-form" class="form-grid">
        <input type="hidden" id="m-id">
        <div class="form-group">
          <label class="form-label" for="m-title">মিটিংয়ের শিরোনাম *</label>
          <input class="form-input" id="m-title" type="text" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="m-date">তারিখ *</label>
            <input class="form-input" id="m-date" type="date" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="m-time">সময় *</label>
            <input class="form-input" id="m-time" type="time" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="m-desc">এজেন্ডা / নোট</label>
          <textarea class="form-textarea" id="m-desc" rows="3"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="m-delete" style="margin-right:auto;display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        মিটিং মুছুন
      </button>
      <button class="btn btn-secondary" id="m-cancel">বাতিল</button>
      <button class="btn btn-primary" type="submit" form="meeting-form">আপডেট করুন</button>
    </div>
  </div>
</div>

<div id="app-toast" class="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────
let meeting = null;
let activeFilter = 'all'; // 'all' | 'open' | 'done' | 'incomplete'
let openTaskModal;
let openMeetingModal;

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  wireGlobal(() => {}); // theme only

  // Populate dept select
  const selDept = document.getElementById('t-dept');
  DEPARTMENTS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.key;
    opt.textContent = `${d.icon} ${d.label}`;
    selDept.appendChild(opt);
  });

  // Filter pills
  document.querySelectorAll('.task-filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.task-filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter = pill.dataset.filter;
      renderDepts();
    });
  });

  // Get meeting ID from URL
  const params = new URLSearchParams(window.location.search);
  const mid = params.get('id');
  if (!mid) { window.location.replace('meetings.html'); return; }

  await APP.load();
  meeting = APP.meetings.find(m => m.id === mid);
  if (!meeting) { window.location.replace('meetings.html'); return; }

  // Populate page
  document.title = `${meeting.title} — মিটিং ট্র্যাকার`;
  document.getElementById('page-title').textContent = meeting.title;
  document.getElementById('breadcrumb-title').textContent = meeting.title;

  // Task modal
  openTaskModal = createTaskModal((updatedMeeting) => {
    meeting = updatedMeeting;
    renderAll();
  });

  // Meeting modal
  openMeetingModal = createMeetingModal(
    (updated) => {
      meeting = updated;
      document.getElementById('page-title').textContent = meeting.title;
      document.getElementById('breadcrumb-title').textContent = meeting.title;
      renderAll();
    },
    (id) => {
      APP.meetings = APP.meetings.filter(m => m.id !== id);
      APP.save();
      window.location.replace('meetings.html');
    }
  );

  document.getElementById('btn-add-task').addEventListener('click', () => openTaskModal(meeting.id, null));
  document.getElementById('btn-edit-meeting').addEventListener('click', () => openMeetingModal(meeting));

  renderAll();
});

// ── Render ───────────────────────────────────────────────────
function renderAll() {
  renderBanner();
  renderDepts();
}

function renderBanner() {
  if (!meeting) return;
  const banner = document.getElementById('meeting-banner');
  banner.style.display = 'block';

  const dateObj = new Date(meeting.date);
  const dateStr = dateObj.toLocaleDateString('bn-BD', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  let timeStr = meeting.time || '';
  try {
    const [h, m] = meeting.time.split(':');
    const hr = parseInt(h);
    timeStr = `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
  } catch(e) {}

  document.getElementById('banner-datetime').textContent = `${dateStr} · ${timeStr}`;
  document.getElementById('banner-desc').textContent = meeting.description || 'কোনো এজেন্ডা বা নোট সংরক্ষিত নেই।';

  const tasks = meeting.tasks || [];
  const done = tasks.filter(t => t.completed).length;
  const total = tasks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('banner-pct').textContent = pct + '%';
  document.getElementById('banner-bar').style.width = pct + '%';
  document.getElementById('banner-counts').textContent = `${done}/${total} টাস্ক সম্পন্ন`;
}

function renderDepts() {
  if (!meeting) return;
  const container = document.getElementById('dept-sections');
  const allTasks = meeting.tasks || [];

  // Filter by activeFilter
  let visibleTasks = allTasks;
  if (activeFilter === 'open') visibleTasks = allTasks.filter(t => t.status === 'open' || (!t.status && !t.completed));
  else if (activeFilter === 'done') visibleTasks = allTasks.filter(t => t.status === 'done' || (!t.status && t.completed));
  else if (activeFilter === 'incomplete') visibleTasks = allTasks.filter(t => t.status === 'incomplete');

  if (visibleTasks.length === 0 && allTasks.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h3>এই মিটিংয়ে কোনো টাস্ক নেই</h3>
        <p>উপরে "টাস্ক যোগ করুন" বাটনে ক্লিক করে প্রথম টাস্ক তৈরি করুন।</p>
      </div>`;
    return;
  }

  if (visibleTasks.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>এই ফিল্টারে কোনো টাস্ক নেই</h3>
        <p>ফিল্টার পরিবর্তন করে আবার চেষ্টা করুন।</p>
      </div>`;
    return;
  }

  // Group by department
  const tasksByDept = {};
  DEPARTMENTS.forEach(d => { tasksByDept[d.key] = []; });
  visibleTasks.forEach(t => {
    const k = t.department || 'general';
    if (!tasksByDept[k]) tasksByDept[k] = [];
    tasksByDept[k].push(t);
  });

  let html = '';
  DEPARTMENTS.forEach(dept => {
    const dTasks = tasksByDept[dept.key];
    if (!dTasks || dTasks.length === 0) return;

    const doneCnt = dTasks.filter(t => t.status === 'done' || (!t.status && t.completed)).length;
    const incompleteCnt = dTasks.filter(t => t.status === 'incomplete').length;
    const totalCnt = dTasks.length;
    const dPct = Math.round(doneCnt / totalCnt * 100);

    html += `
      <div class="dept-section" data-dept="${dept.key}">
        <div class="dept-header" onclick="toggleDept('${dept.key}', this)">
          <span class="dept-icon">${dept.icon}</span>
          <span class="dept-name">${dept.label}</span>
          <div class="dept-stats">
            <span class="dept-count">${doneCnt}/${totalCnt} · ${dPct}%${incompleteCnt > 0 ? ` · <span style="color:#ef4444">${incompleteCnt} অসম্পন্ন</span>` : ''}</span>
            <div style="width:60px;" class="progress-bg">
              <div class="progress-fill progress-emerald" style="width:${dPct}%"></div>
            </div>
          </div>
          <svg class="dept-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="dept-task-list">
          ${dTasks.map(t => buildTaskItem(t)).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  // Wire interactions
  container.querySelectorAll('.task-complete-ring').forEach(ring => {
    ring.addEventListener('click', () => toggleTask(ring.dataset.id));
  });

  container.querySelectorAll('.task-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = (meeting.tasks || []).find(x => x.id === btn.dataset.id);
      if (t) openTaskModal(meeting.id, t);
    });
  });

  container.querySelectorAll('.task-del-btn').forEach(btn => {
    btn.addEventListener('click', () => deleteTask(btn.dataset.id));
  });

  container.querySelectorAll('.task-remarks-input').forEach(input => {
    input.addEventListener('change', () => saveRemarks(input.dataset.id, input.value));
    input.addEventListener('input', () => {
      const saved = input.closest('.task-item').querySelector('.remarks-saved');
      if (saved) { saved.classList.remove('visible'); }
    });
  });
}

function getTaskStatus(t) {
  // Normalise legacy boolean-only tasks
  if (t.status) return t.status;
  return t.completed ? 'done' : 'open';
}

function buildTaskItem(t) {
  const status = getTaskStatus(t);
  const priBadge = `<span class="badge ${PRIORITY_BADGE[t.priority] || 'badge-medium'}">${PRIORITY_LABELS[t.priority] || ''}</span>`;
  const dept = getDept(t.department || 'general');

  const remarksPlaceholder = status === 'done'
    ? 'মিটিং নোট বা অতিরিক্ত মন্তব্য...'
    : status === 'incomplete'
      ? 'কেন সম্পন্ন হয়নি? কোনো বাধা আছে? পরবর্তী পদক্ষেপ কী?'
      : 'কোনো মন্তব্য বা নোট লিখুন...';
  const remarksLabel = status === 'done' ? '📝 মন্তব্য' : status === 'incomplete' ? '⚠️ অসম্পন্নের কারণ / মন্তব্য' : '📝 মন্তব্য';

  const remarksBlock = `
    <div class="task-remarks-block">
      <div style="display:flex;align-items:center;">
        <span class="task-remarks-label">${remarksLabel}</span>
        <span class="remarks-saved" id="saved-${t.id}">✓ সংরক্ষিত</span>
      </div>
      <textarea
        class="task-remarks-input"
        data-id="${t.id}"
        placeholder="${remarksPlaceholder}"
        rows="2"
      >${escapeHTML(t.remarks || '')}</textarea>
    </div>
  `;

  const ringClass = status === 'done' ? 'done' : status === 'incomplete' ? 'incomplete' : '';
  const ringTitle = status === 'done' ? 'চলমানে পরিবর্তন করুন' : status === 'incomplete' ? 'চলমানে পরিবর্তন করুন' : 'সম্পন্ন / অসম্পন্ন চিহ্নিত করুন';
  const itemClass = status === 'done' ? 'is-done' : status === 'incomplete' ? 'is-incomplete' : 'is-open';

  const statusBadge = status === 'incomplete'
    ? `<span style="font-size:10px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:4px;padding:1px 6px;margin-left:6px;">অসম্পন্ন</span>`
    : '';

  return `
    <div class="task-item ${itemClass}" data-id="${t.id}">
      <div class="task-row-top">
        <div class="task-complete-ring ${ringClass}" data-id="${t.id}" title="${ringTitle}">
          <svg class="ring-check" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          <svg class="ring-x" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="task-text-block">
          <div class="task-title">${escapeHTML(t.title)}${statusBadge}</div>
          ${t.description ? `<div class="task-desc">${escapeHTML(t.description)}</div>` : ''}
          <div class="task-meta">
            ${priBadge}
            ${t.assignee ? `<span class="task-assignee"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escapeHTML(t.assignee)}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button class="btn-icon task-edit-btn" data-id="${t.id}" title="সম্পাদনা">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button class="btn-icon danger task-del-btn" data-id="${t.id}" title="মুছুন">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      ${remarksBlock}
    </div>
  `;
}

// ── Actions ──────────────────────────────────────────────────
function toggleTask(taskId) {
  const task = (meeting.tasks || []).find(t => t.id === taskId);
  if (!task) return;

  // Cycle: open → done → incomplete → open
  const current = getTaskStatus(task);
  if (current === 'open') {
    task.status = 'done';
    task.completed = true; // keep legacy field in sync
    showToast('✓ টাস্ক সম্পন্ন হয়েছে');
  } else if (current === 'done') {
    task.status = 'incomplete';
    task.completed = false;
    showToast('✗ টাস্ক অসম্পন্ন চিহ্নিত হয়েছে');
  } else {
    task.status = 'open';
    task.completed = false;
    showToast('⏳ টাস্ক পুনরায় চালু হয়েছে');
  }

  APP.save();
  renderAll();
}

function deleteTask(taskId) {
  if (!confirm('এই টাস্কটি মুছে ফেলবেন?')) return;
  meeting.tasks = (meeting.tasks || []).filter(t => t.id !== taskId);
  APP.save();
  showToast('টাস্ক মুছে ফেলা হয়েছে');
  renderAll();
}

function saveRemarks(taskId, value) {
  const task = (meeting.tasks || []).find(t => t.id === taskId);
  if (!task) return;
  task.remarks = value.trim();
  APP.save();
  const savedEl = document.getElementById(`saved-${taskId}`);
  if (savedEl) {
    savedEl.classList.add('visible');
    setTimeout(() => savedEl.classList.remove('visible'), 2500);
  }
}

function toggleDept(key, headerEl) {
  const section = headerEl.closest('.dept-section');
  section.classList.toggle('collapsed');
}

// ── Print Report ──────────────────────────────────────────────────
function printMeeting() {
  if (!meeting) return;

  const tasks = meeting.tasks || [];
  const doneCnt      = tasks.filter(t => getTaskStatus(t) === 'done').length;
  const incompleteCnt= tasks.filter(t => getTaskStatus(t) === 'incomplete').length;
  const openCnt      = tasks.filter(t => getTaskStatus(t) === 'open').length;
  const total        = tasks.length;
  const pct          = total > 0 ? Math.round(doneCnt / total * 100) : 0;

  // Date/time formatting
  const dateObj = new Date(meeting.date);
  const dateStr = dateObj.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
  let timeStr = meeting.time || '';
  try {
    const [h, m] = meeting.time.split(':');
    const hr = parseInt(h);
    timeStr = `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
  } catch(e) {}

  const statusIcon  = { done: '\u2713 \u09b8\u09ae\u09cd\u09aa\u09a8\u09cd\u09a8', incomplete: '\u2717 \u0985\u09b8\u09ae\u09cd\u09aa\u09a8\u09cd\u09a8', open: '\u23f3 \u099a\u09b2\u09ae\u09be\u09a8' };
  const statusColor = { done: '#15803d', incomplete: '#b91c1c', open: '#b45309' };
  const statusBg    = { done: '#dcfce7', incomplete: '#fee2e2', open: '#fef9c3' };
  const priLabel    = { high: '\u0985\u09a7\u09bf\u0995', medium: '\u09ae\u09be\u099d\u09be\u09b0\u09bf', low: '\u0995\u09ae' };
  const priColor    = { high: '#b91c1c', medium: '#b45309', low: '#15803d' };

  // Flatten all tasks in dept order
  const rows = [];
  const tasksByDept = {};
  DEPARTMENTS.forEach(d => { tasksByDept[d.key] = []; });
  tasks.forEach(t => {
    const k = t.department || 'general';
    if (!tasksByDept[k]) tasksByDept[k] = [];
    tasksByDept[k].push(t);
  });

  // Build flat rows in dept order, with a dept label row as separator
  let rowsHtml = '';
  let serial = 0;
  DEPARTMENTS.forEach(dept => {
    const dTasks = tasksByDept[dept.key];
    if (!dTasks || dTasks.length === 0) return;

    // Dept separator row
    rowsHtml += `
      <tr>
        <td colspan="6" style="padding:5px 8px 3px;background:#ede9fe;color:#4c1d95;font-size:9px;font-weight:700;letter-spacing:0.5px;border-bottom:1px solid #c4b5fd;">
          ${dept.icon} ${dept.label}
        </td>
      </tr>`;

    dTasks.forEach(t => {
      serial++;
      const s = getTaskStatus(t);
      const rowBg = serial % 2 === 0 ? '#f9fafb' : '#ffffff';
      rowsHtml += `
        <tr style="background:${rowBg};">
          <td style="padding:4px 6px;color:#9ca3af;border-bottom:1px solid #f3f4f6;font-size:9px;width:22px;text-align:center;">${serial}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #f3f4f6;font-size:10px;font-weight:600;color:#111827;max-width:220px;">${escapeHTML(t.title)}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #f3f4f6;font-size:9px;color:#374151;white-space:nowrap;">${escapeHTML(t.assignee || '—')}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #f3f4f6;font-size:9px;font-weight:600;color:${priColor[t.priority]||'#374151'};white-space:nowrap;">${priLabel[t.priority]||'—'}</td>
          <td style="padding:4px 6px;border-bottom:1px solid #f3f4f6;text-align:center;white-space:nowrap;">
            <span style="font-size:9px;font-weight:700;color:${statusColor[s]};background:${statusBg[s]};border-radius:20px;padding:1px 7px;">${statusIcon[s]}</span>
          </td>
          <td style="padding:4px 6px;border-bottom:1px solid #f3f4f6;font-size:9px;color:#6b7280;max-width:140px;">${escapeHTML(t.remarks || '—')}</td>
        </tr>`;
    });
  });

  const printHtml = `<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>\u09ae\u09bf\u099f\u09bf\u0982 \u09b0\u09bf\u09aa\u09cb\u09b0\u09cd\u099f \u2014 ${escapeHTML(meeting.title)}</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hind Siliguri', sans-serif; color: #111827; background: #fff; font-size: 10px; }
    @page { size: A4 portrait; margin: 8mm 10mm; }
    table { border-collapse: collapse; }
  </style>
</head>
<body>

  <!-- Compact Header -->
  <div style="border-bottom:2.5px solid #8b5cf6;padding-bottom:7px;margin-bottom:7px;display:flex;align-items:flex-end;justify-content:space-between;">
    <div>
      <div style="font-size:7.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b5cf6;margin-bottom:2px;">\u09ae\u09bf\u099f\u09bf\u0982 \u099f\u09cd\u09b0\u09cd\u09af\u09be\u0995\u09be\u09b0 \u2014 \u099f\u09be\u09b8\u09cd\u0995 \u09b0\u09bf\u09aa\u09cb\u09b0\u09cd\u099f</div>
      <div style="font-size:16px;font-weight:800;color:#1e1b4b;line-height:1.2;">${escapeHTML(meeting.title)}</div>
      <div style="font-size:9px;color:#6b7280;margin-top:2px;">${dateStr} &nbsp;·&nbsp; ${timeStr}${meeting.description ? ' &nbsp;·&nbsp; ' + escapeHTML(meeting.description) : ''}</div>
    </div>
    <div style="text-align:right;flex-shrink:0;margin-left:16px;">
      <div style="font-size:24px;font-weight:800;color:#8b5cf6;line-height:1;">${pct}%</div>
      <div style="font-size:7.5px;color:#6b7280;">\u09b8\u09ae\u09cd\u09aa\u09a8\u09cd\u09a8\u09a4\u09be\u09b0 \u09b9\u09be\u09b0</div>
    </div>
  </div>

  <!-- Inline Stat Strip -->
  <div style="display:flex;gap:6px;margin-bottom:8px;">
    <div style="flex:1;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;">
      <span style="font-size:14px;font-weight:800;color:#1e1b4b;">${total}</span>
      <span style="font-size:8px;color:#6b7280;font-weight:600;">\u09ae\u09cb\u099f \u099f\u09be\u09b8\u09cd\u0995</span>
    </div>
    <div style="flex:1;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;">
      <span style="font-size:14px;font-weight:800;color:#15803d;">${doneCnt}</span>
      <span style="font-size:8px;color:#6b7280;font-weight:600;">\u2713 \u09b8\u09ae\u09cd\u09aa\u09a8\u09cd\u09a8</span>
    </div>
    <div style="flex:1;background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;">
      <span style="font-size:14px;font-weight:800;color:#b45309;">${openCnt}</span>
      <span style="font-size:8px;color:#6b7280;font-weight:600;">\u23f3 \u099a\u09b2\u09ae\u09be\u09a8</span>
    </div>
    <div style="flex:1;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;">
      <span style="font-size:14px;font-weight:800;color:#b91c1c;">${incompleteCnt}</span>
      <span style="font-size:8px;color:#6b7280;font-weight:600;">\u2717 \u0985\u09b8\u09ae\u09cd\u09aa\u09a8\u09cd\u09a8</span>
    </div>
    <div style="flex:2;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;">
      <div style="flex:1;height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#8b5cf6,#10b981);border-radius:99px;"></div>
      </div>
      <span style="font-size:8px;color:#374151;font-weight:700;white-space:nowrap;">${pct}%</span>
    </div>
  </div>

  <!-- Single Compact Task Table -->
  <table style="width:100%;font-size:10px;">
    <thead>
      <tr style="background:#1e1b4b;">
        <th style="padding:5px 6px;text-align:center;font-weight:700;color:#fff;width:22px;">#</th>
        <th style="padding:5px 6px;text-align:left;font-weight:700;color:#fff;">\u099f\u09be\u09b8\u09cd\u0995\u09c7\u09b0 \u09a8\u09be\u09ae</th>
        <th style="padding:5px 6px;text-align:left;font-weight:700;color:#fff;white-space:nowrap;">\u09a6\u09be\u09af\u09bc\u09bf\u09a4\u09cd\u09ac\u09aa\u09cd\u09b0\u09be\u09aa\u09cd\u09a4</th>
        <th style="padding:5px 6px;text-align:left;font-weight:700;color:#fff;white-space:nowrap;">\u0997\u09c1\u09b0\u09c1\u09a4\u09cd\u09ac</th>
        <th style="padding:5px 6px;text-align:center;font-weight:700;color:#fff;white-space:nowrap;">\u0985\u09ac\u09b8\u09cd\u09a5\u09be</th>
        <th style="padding:5px 6px;text-align:left;font-weight:700;color:#fff;">\u09ae\u09a8\u09cd\u09a4\u09ac\u09cd\u09af</th>
      </tr>
    </thead>
    <tbody>${rowsHtml}</tbody>
  </table>

  <!-- Footer -->
  <div style="margin-top:8px;border-top:1px solid #e5e7eb;padding-top:5px;display:flex;justify-content:space-between;font-size:7.5px;color:#9ca3af;">
    <span>\u09ae\u09bf\u099f\u09bf\u0982 \u099f\u09cd\u09b0\u09cd\u09af\u09be\u0995\u09be\u09b0 \u09b8\u09bf\u09b8\u09cd\u099f\u09c7\u09ae \u09a5\u09c7\u0995\u09c7 \u09b8\u09cd\u09ac\u09af\u09bc\u0982\u0995\u09cd\u09b0\u09bf\u09af\u09bc\u09ad\u09be\u09ac\u09c7 \u09a4\u09c8\u09b0\u09bf</span>
    <span>\u09ae\u09c1\u09a6\u09cd\u09b0\u09a3: ${new Date().toLocaleDateString('bn-BD', {year:'numeric',month:'long',day:'numeric'})}</span>
  </div>

</body>
</html>`;

  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(printHtml);
  win.document.close();
  win.onload = () => { win.focus(); win.print(); };
}

</script>
