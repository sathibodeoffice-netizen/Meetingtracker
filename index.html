<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Tracker - Login</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-body: #0f111a;
      --bg-surface: rgba(255, 255, 255, 0.05);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 400px), 
        radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15), transparent 400px);
    }
    .auth-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    .auth-card {
      background: var(--bg-surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }
    .brand-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .auth-tabs {
      display: flex;
      background-color: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 6px;
      margin-bottom: 32px;
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
    }
    .auth-tab.active {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    option {
      background: var(--bg-body);
      color: white;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/>
          </svg>
        </div>
        <span class="brand-name">Meeting Tracker</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="auth-message" class="message"></div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="handleLogin(event)" autocomplete="off">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" required placeholder="Enter your email" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="Enter your password" autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="btn-login">Log In</button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="form-signup" class="hidden" onsubmit="handleSignup(event)" autocomplete="off">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" required placeholder="John Doe" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Designation (e.g., Customer Care)</label>
          <input type="text" id="signup-designation" required placeholder="Agent Role Name" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" required placeholder="john@example.com" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="signup-role" required>
            <option value="" disabled selected>Select Role</option>
            <option value="agent">Agent</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" required placeholder="Create a strong password" minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm-password" required placeholder="Confirm your password" minlength="6">
        </div>
        <button type="submit" class="btn" id="btn-signup">Create Account</button>
      </form>

    </div>
  </div>

  <script>
    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      // Clear forms to prevent auto-login loops from password managers
      document.getElementById('form-login').reset();
      document.getElementById('form-signup').reset();
      
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('logout') === 'true') {
        localStorage.removeItem('mt_token');
        localStorage.removeItem('mt_user');
        window.history.replaceState({}, document.title, "/");
      } else {
        const token = localStorage.getItem('mt_token');
        if (token) {
          window.location.href = '/dashboard.html';
        }
      }
    });

    function switchTab(tab) {
      document.getElementById('auth-message').className = 'message hidden';
      if (tab === 'login') {
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-signup').classList.remove('active');
        document.getElementById('form-login').classList.remove('hidden');
        document.getElementById('form-signup').classList.add('hidden');
      } else {
        document.getElementById('tab-signup').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('form-signup').classList.remove('hidden');
        document.getElementById('form-login').classList.add('hidden');
      }
    }

    function showMessage(text, type) {
      const msgEl = document.getElementById('auth-message');
      msgEl.textContent = text;
      msgEl.className = `message ${type}`;
    }

    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const designation = document.getElementById('signup-designation').value;
      const email = document.getElementById('signup-email').value;
      const role = document.getElementById('signup-role').value;
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm-password').value;
      const btn = document.getElementById('btn-signup');

      if (password !== confirmPassword) {
        showMessage("Passwords do not match!", "error");
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = "Creating Account...";
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'signup', name, designation, email, role, password })
        });
        const data = await res.json();

        if (res.ok) {
          showMessage("Account created successfully! You can now log in.", "success");
          setTimeout(() => switchTab('login'), 2000);
          e.target.reset();
        } else {
          showMessage(data.error || "Failed to create account.", "error");
        }
      } catch (err) {
        showMessage("Network error. Please try again.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');

      try {
        btn.disabled = true;
        btn.textContent = "Logging in...";
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email, password })
        });
        const data = await res.json();

        if (res.ok) {
          showMessage("Login successful! Redirecting...", "success");
          localStorage.setItem('mt_token', data.token || 'logged_in');
          localStorage.setItem('mt_user', JSON.stringify(data.user));
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showMessage(data.error || "Invalid email or password.", "error");
        }
      } catch (err) {
        showMessage("Network error. Please try again.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Log In";
      }
    }
  </script>
</body>
</html>
